      <h1 class="success-title">Order Confirmed</h1>
      <p class="success-sub" id="successMsg">
        Thank you for your order! Your Panifit cubes are being prepared and will ship within 24 hours. Check your email for tracking details.
      </p>
      <div id="orderDetails" style="text-align:left; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:32px;"></div>

  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('order_id');
    const sessionId = params.get('session_id');
    const shipping = JSON.parse(localStorage.getItem('panifit_shipping') || 'null');
    const pending = JSON.parse(localStorage.getItem('panifit_pending_order') || 'null');
    const detailsEl = document.getElementById('orderDetails');
    const fallbackOrderId = orderId || (pending && pending.orderId) || 'PF-' + Date.now();

    localStorage.setItem('panifit_cart', '[]');
    updateCartCount();

    function renderSummary(order) {
      const rows = [
        `<div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);font-size:13px;">Order ID</span><span style="font-family:'Space Mono',monospace;font-size:13px;color:var(--yellow-dark);">${order.orderId}</span></div>`,
        `<div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);font-size:13px;">Email</span><span style="font-size:13px;">${order.email || (shipping && shipping.email) || ''}</span></div>`,
        `<div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);font-size:13px;">Status</span><span style="font-size:13px;text-transform:capitalize;">${order.status}</span></div>`,
        `<div style="display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);font-size:13px;">Ships To</span><span style="font-size:13px;text-align:right;">${[order.address, order.city, order.state, order.zip].filter(Boolean).join(', ')}</span></div>`,
        `<div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);font-size:13px;">Total Charged</span><span style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--yellow-dark);">$${Number(order.total || 0).toFixed(2)}</span></div>`
      ];

      detailsEl.innerHTML = rows.join('');

      const firstName = order.firstName || (shipping && shipping.firstName) || '';
      const email = order.email || (shipping && shipping.email) || 'your email';
      document.getElementById('successMsg').innerHTML = `Thank you${firstName ? ', <strong>' + firstName + '</strong>' : ''}! Your payment is confirmed and a nicely formatted order email has been sent to <strong>${email}</strong>.`;
    }

    async function confirmOrder() {
      if (!orderId || !sessionId) {
        renderSummary({
          orderId: fallbackOrderId,
          email: shipping && shipping.email,
          status: 'paid',
          address: shipping && shipping.address,
          city: shipping && shipping.city,
          state: shipping && shipping.state,
          zip: shipping && shipping.zip,
          total: pending ? (pending.total >= 30 ? pending.total : pending.total + 5.99) : 0,
          firstName: shipping && shipping.firstName
        });
        return;
      }

      try {
        const response = await fetch('api/confirm-order.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, sessionId })
        });
        const data = await response.json();
        if (!response.ok || data.error) {
          throw new Error(data.error || 'Order confirmation failed');
        }
        renderSummary(data.order);
      } catch (error) {
        renderSummary({
          orderId: fallbackOrderId,
          email: shipping && shipping.email,
          status: 'paid',
          address: shipping && shipping.address,
          city: shipping && shipping.city,
          state: shipping && shipping.state,
          zip: shipping && shipping.zip,
          total: pending ? (pending.total >= 30 ? pending.total : pending.total + 5.99) : 0,
          firstName: shipping && shipping.firstName
        });
      } finally {
        localStorage.removeItem('panifit_shipping');
        localStorage.removeItem('panifit_pending_order');
      }
    }

    confirmOrder();
  </script>
